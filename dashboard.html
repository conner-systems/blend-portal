// 30-day daily data with realistic weekend dips
function makeDayData(){
  const days=[];
  const labels=[];
  for(let i=29;i>=0;i--){
    const d=new Date(); d.setDate(d.getDate()-i);
    const dow=d.getDay();
    const base=DOW_DATA[dow];
    const noise=Math.round((Math.random()-0.5)*8);
    days.push(Math.max(0,base+noise));
    labels.push(d.toLocaleDateString("en-US",{month:"short",day:"numeric"}));
  }
  return {days,labels};
}

const TREND_LABELS=DAY30.labels;

const MOM_GROSS=Math.round((9205-LAST_MONTH_GROSS)/LAST_MONTH_GROSS*100);
const MOM_HOST=Math.round((1841-LAST_MONTH_HOST)/LAST_MONTH_HOST*100);

function hourlyTotal(){return HOURLY.reduce((s,v)=>s+v,0);}
function hourlyPct(){return HOURLY.map(v=>+(v/hourlyTotal()*100).toFixed(1));}
function isHappyHour(h){return HAPPY_HOUR_WINDOWS.some(([s,e])=>h>=s&&h<e);}
function isPeak(h,data){const max=Math.max(...data);return data[h]>=max*0.8;}

let dark=false,enterprise=false,selId="BLN-001",period="month";
let chartHourly=null,chartTrend=null,chartDow=null;

function t(){return dark?DARK:LIGHT;}
function machines(){return enterprise?[M1,M2,M3]:[M1];}
function sel(){return machines().find(m=>m.id===selId)||M1;}
function fmt(n,pre="$"){return pre+n.toLocaleString("en-US",{minimumFractionDigits:n%1!==0?2:0,maximumFractionDigits:2});}
function lc(p){if(p<=15)return t().red;if(p<=30)return t().orange;if(p<=50)return t().yellow;return t().green;}
function agg(key,sub){return machines().reduce((s,m)=>s+(m[key][sub]||0),0);}
function aggAov(){const ms=machines();const to=ms.reduce((s,m)=>s+(m.orders[period]||0),0);const tg=ms.reduce((s,m)=>s+(m.gross[period]||0),0);return to>0?(tg/to):0;}
function catC(cat){return{base:t().cyan,protein:"#A78BFA",supp:"#34D399"}[cat]||t().sub;}

function destroyCharts(){
  if(chartHourly){chartHourly.destroy();chartHourly=null;}
  if(chartTrend){chartTrend.destroy();chartTrend=null;}
  if(chartDow){chartDow.destroy();chartDow=null;}
}

function buildCharts(){
  const c=t();
  const gridColor=dark?"rgba(30,45,66,0.8)":"rgba(216,227,240,0.8)";
  const tickColor=c.muted;

  // Hourly chart
  const hCtx=document.getElementById("chartHourly");
  if(hCtx){
    const data=hourlyMode==="pct"?hourlyPct():HOURLY;
    const total=hourlyTotal();
    const evenLine=hourlyMode==="pct"?(100/OPERATING_HOURS):Math.round(total/OPERATING_HOURS);
    const barColors=data.map((_,h)=>{
      if(isHappyHour(h))return dark?"rgba(0,229,255,0.85)":"rgba(0,119,187,0.85)";
      if(isPeak(h,data))return dark?"rgba(0,208,132,0.85)":"rgba(0,153,85,0.85)";
      if(data[h]===0)return dark?"rgba(255,255,255,0.06)":"rgba(0,0,0,0.08)";
      return dark?"rgba(255,255,255,0.22)":"rgba(0,0,0,0.18)";
    });
    chartHourly=new Chart(hCtx,{
      type:"bar",
      data:{
        labels:HOURLY_LABELS,
        datasets:[
          {
            label:hourlyMode==="pct"?"% of daily orders":"orders",
            data:data,
            backgroundColor:barColors,
            borderRadius:4,
            borderSkipped:false,
            order:2
          },
          {
            label:"even distribution",
            data:Array(24).fill(evenLine),
            type:"line",
            borderColor:dark?"rgba(255,184,0,0.6)":"rgba(187,119,0,0.6)",
            borderWidth:1.5,
            borderDash:[4,4],
            pointRadius:0,
            fill:false,
            order:1
          }
        ]
      },
      options:{
        responsive:true,maintainAspectRatio:false,
        plugins:{
          legend:{display:false},
          tooltip:{
            backgroundColor:dark?"#0F1520":"#FFFFFF",
            borderColor:c.border,borderWidth:1,
            titleColor:c.text,bodyColor:c.sub,
            callbacks:{
              title:items=>HOURLY_LABELS[items[0].dataIndex]+" — "+["12am","1am","2am","3am","4am","5am","6am","7am","8am","9am","10am","11am","12pm","1pm","2pm","3pm","4pm","5pm","6pm","7pm","8pm","9pm","10pm","11pm"][items[0].dataIndex],
              label:ctx=>{
                if(ctx.datasetIndex===1)return "Even dist: "+(hourlyMode==="pct"?ctx.raw.toFixed(1)+"%":ctx.raw+" orders");
                const h=ctx.dataIndex;
                const lines=[hourlyMode==="pct"?ctx.raw.toFixed(1)+"% of daily orders":ctx.raw+" orders"];
                if(isHappyHour(h))lines.push("⚡ Happy Hour window");
                if(isPeak(h,data))lines.push("📈 Peak demand");
                if(data[h]>0&&data[h]<evenLine)lines.push("💡 Promo opportunity");
                return lines;
              }
            }
          },
          annotation:{} 
        },
        scales:{
          x:{grid:{color:gridColor},ticks:{color:tickColor,font:{size:10,family:"DM Mono, Courier New, monospace"}}},
          y:{grid:{color:gridColor},ticks:{color:tickColor,font:{size:10,family:"DM Mono, Courier New, monospace"},callback:v=>hourlyMode==="pct"?v+"%":v},beginAtZero:true}
        }
      }
    });
  }

  // Day of week chart
  const dowCtx=document.getElementById("chartDow");
  if(dowCtx){
    const maxVal=Math.max(...DOW_DATA);
    chartDow=new Chart(dowCtx,{
      type:"bar",
      data:{
        labels:DOW_LABELS,
        datasets:[{
          data:DOW_DATA,
          backgroundColor:DOW_DATA.map((v,i)=>{
            if(v===maxVal)return c.green;
            if(i===0)return dark?"rgba(255,59,92,0.6)":"rgba(187,17,51,0.6)";
            if(v>=maxVal*0.85)return dark?"rgba(0,208,132,0.65)":"rgba(0,153,85,0.65)";
            return dark?"rgba(255,255,255,0.2)":"rgba(0,0,0,0.15)";
          }),
          borderRadius:4,borderSkipped:false,
        }]
      },
      options:{
        responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{
          backgroundColor:dark?"#0F1520":"#FFFFFF",
          borderColor:c.border,borderWidth:1,
          titleColor:c.text,bodyColor:c.sub,
          callbacks:{label:ctx=>`${ctx.raw} avg orders`}
        }},
        scales:{
          x:{grid:{color:gridColor},ticks:{color:tickColor,font:{size:11,family:"DM Mono, Courier New, monospace"}}},
          y:{grid:{color:gridColor},ticks:{color:tickColor,font:{size:10,family:"DM Mono, Courier New, monospace"}},beginAtZero:true}
        }
      }
    });
  }

  // Trend chart — dual axis orders + revenue
  const tCtx=document.getElementById("chartTrend");
  if(tCtx){
    chartTrend=new Chart(tCtx,{
      type:"line",
      data:{
        labels:TREND_LABELS,
        datasets:[
          {
            label:"Orders",
            data:TREND_ORDERS,
            borderColor:c.cyan,
            backgroundColor:dark?"rgba(0,229,255,0.08)":"rgba(0,119,187,0.08)",
            borderWidth:2,pointRadius:0,pointHoverRadius:4,
            fill:true,tension:0.4,yAxisID:"y"
          },
          {
            label:"Revenue ($)",
            data:TREND_REVENUE,
            borderColor:c.green,
            backgroundColor:"transparent",
            borderWidth:2,pointRadius:0,pointHoverRadius:4,
            fill:false,tension:0.4,yAxisID:"y2",
            borderDash:[4,3]
          }
        ]
      },
      options:{
        responsive:true,maintainAspectRatio:false,
        interaction:{mode:"index",intersect:false},
        plugins:{
          legend:{
            display:true,position:"top",align:"end",
            labels:{color:c.sub,font:{size:11,family:"DM Mono, Courier New, monospace"},boxWidth:12,padding:16}
          },
          tooltip:{
            backgroundColor:dark?"#0F1520":"#FFFFFF",
            borderColor:c.border,borderWidth:1,
            titleColor:c.text,bodyColor:c.sub,
            callbacks:{label:ctx=>ctx.dataset.label==="Revenue ($)"?`Revenue: $${ctx.raw}`:`Orders: ${ctx.raw}`}
          }
        },
        scales:{
          x:{grid:{color:gridColor},ticks:{color:tickColor,font:{size:10,family:"DM Mono, Courier New, monospace"},maxTicksLimit:8}},
          y:{grid:{color:gridColor},ticks:{color:c.cyan,font:{size:10,family:"DM Mono, Courier New, monospace"}},beginAtZero:false,title:{display:true,text:"Orders",color:c.cyan,font:{size:10}}},
          y2:{position:"right",grid:{display:false},ticks:{color:c.green,font:{size:10,family:"DM Mono, Courier New, monospace"},callback:v=>"$"+v},beginAtZero:false,title:{display:true,text:"Revenue",color:c.green,font:{size:10}}}
        }
      }
    });
  }
}

              </div>
              <div style="font-size:11px;color:${lc(pct)};font-weight:700;">${stat}</div>
            </div>`).join("")}
          </div>
        </div>
        <div class="card" style="background:${c.surface};border:1px solid ${c.border};flex:1;">
          <div style="font-size:10px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:${c.muted};margin-bottom:12px;">Machine Info</div>
          ${[["Machine ID",m.id],["Location",m.location],["Uptime",m.uptime],["Last Seen","Just now"],["Firmware","v2.4.1"]].map(([l,v])=>`
          <div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid ${c.border};">
            <span style="font-size:11px;color:${c.muted};">${l}</span>
            <span style="font-size:12px;font-weight:600;color:${c.text};">${v}</span>
          </div>`).join("")}
        </div>
      </div>
    </div>

  </div>
  </div>
  </div>`;

  // Build charts after DOM is ready
  setTimeout(buildCharts, 50);
}

function setHourlyMode(mode){hourlyMode=mode;render();}
function toggleDark(){dark=!dark;render();}
function toggleEnterprise(){enterprise=!enterprise;selId="BLN-001";render();}
function selectM(id){selId=id;render();}
function setPeriod(p){period=p;render();}

render();
setInterval(render,60000);
</script>
</body>
</html>
